<div class="view-section active">
  <!-- Profile Header Banner -->
  <div class="banner-card">
    <div class="banner-left">
      <div class="banner-icon-container">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
      </div>
      <div class="banner-text">
        <h1 style="font-size: 28px; font-weight: 800;">Profile</h1>
      </div>
    </div>
  </div>

  <!-- Subview A: Main Profile view -->
  <div id="profile-main-subview" class="profile-card">
    <div class="profile-info-header">
      <div class="profile-avatar-container" id="avatar-container">
        <!-- Default SVG icon (shown when no avatar image) -->
        <svg id="avatar-svg-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
        </svg>
        <!-- Avatar image (shown when uploaded) -->
        <img id="profile-avatar-img" src="" alt="Avatar" style="display: none; width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
        <div class="profile-avatar-badge" id="avatar-upload-trigger" title="Change Profile Picture">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </div>
        <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
      </div>
      <div class="profile-header-text">
        <h2 id="profile-main-name">Name</h2>
        <p id="profile-main-email">hexaware.tech@gmail.com</p>
      </div>
    </div>

    <div class="settings-list-container">
      <span class="settings-list-title">Account Settings</span>
      
      <!-- Personal Details -->
      <button class="settings-item" id="profile-edit-btn">
        <div class="settings-item-left">
          <div class="settings-item-icon">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          </div>
          <span class="settings-item-text">Personal Details</span>
        </div>
        <div class="settings-item-right">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
        </div>
      </button>

      <!-- Password -->
      <button class="settings-item" id="profile-password-btn">
        <div class="settings-item-left">
          <div class="settings-item-icon">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <span class="settings-item-text">Password</span>
        </div>
        <div class="settings-item-right">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
        </div>
      </button>

      <!-- Mode (Dark/Light) -->
      <div class="settings-item">
        <div class="settings-item-left">
          <div class="settings-item-icon">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
          </div>
          <span class="settings-item-text">Mode</span>
        </div>
        <div class="settings-item-right">
          <label class="switch">
            <input type="checkbox" id="mode-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Notifications -->
      <div class="settings-item">
        <div class="settings-item-left">
          <div class="settings-item-icon">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
          </div>
          <span class="settings-item-text">Notifications</span>
        </div>
        <div class="settings-item-right">
          <label class="switch">
            <input type="checkbox" id="notifications-toggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Logout -->
      <button class="settings-item logout-action">
        <div class="settings-item-left">
          <div class="settings-item-icon" style="background-color: #FEF2F2;">
            <svg fill="none" stroke="#EF4444" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          </div>
          <span class="settings-item-text" style="color: #EF4444; font-weight: 600;">Logout</span>
        </div>
        <div class="settings-item-right">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
        </div>
      </button>
    </div>
  </div>

  <!-- Subview B: Edit Profile form -->
  <div id="profile-edit-subview" class="profile-card" style="display: none;">
    <!-- Left chevron and edit profile label -->
    <button class="edit-profile-header" id="edit-profile-back-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
      </svg>
      Edit Profile
    </button>

    <form id="edit-profile-form" class="form-card">
      <div class="form-grid">
        <div class="form-group">
          <label for="edit-fullname">Full name</label>
          <input type="text" id="edit-fullname" class="form-control" required placeholder="Full Name">
        </div>
        
        <div class="form-group">
          <label for="edit-email">Email ID</label>
          <input type="email" id="edit-email" class="form-control" required placeholder="email@domain.com">
        </div>

        <div class="form-group">
          <label for="edit-phone">Phone number</label>
          <input type="tel" id="edit-phone" class="form-control" placeholder="Phone Number">
        </div>

        <div class="form-row-2col">
          <div class="form-group">
            <label for="edit-country">Country</label>
            <select id="edit-country" class="form-control">
              <option value="India">India</option>
              <option value="United States">United States</option>
              <option value="United Kingdom">United Kingdom</option>
              <option value="Canada">Canada</option>
              <option value="Australia">Australia</option>
              <option value="Singapore">Singapore</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-gender">Gender</label>
            <select id="edit-gender" class="form-control">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="edit-address">Address</label>
          <textarea id="edit-address" class="form-control" placeholder="Residential Address"></textarea>
        </div>

        <div class="form-submit-row">
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </div>
    </form>
  </div>

  <!-- Subview C: Change Password form -->
  <div id="profile-password-subview" class="profile-card" style="display: none;">
    <button class="edit-profile-header" id="password-back-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
      </svg>
      Change Password
    </button>

    <form id="change-password-form" class="form-card">
      <div class="form-grid">
        <div class="form-group">
          <label for="current-password">Current Password</label>
          <input type="password" id="current-password" class="form-control" placeholder="Enter current password">
        </div>

        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" class="form-control" placeholder="Enter new password">
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm New Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="Re-enter new password">
        </div>

        <div class="form-submit-row">
          <button type="submit" class="btn-primary">Update Password</button>
        </div>
      </div>
    </form>
  </div>
</div>
