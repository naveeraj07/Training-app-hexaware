<div class="view-section active">
  <!-- Top banner blue card -->
  <div class="banner-card">
    <div class="banner-left">
      <div class="banner-icon-container">
        <!-- Pulse icon waveform -->
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
        </svg>
      </div>
      <div class="banner-text">
        <h1>Your Progress</h1>
        <p>Track your progress</p>
      </div>
    </div>
    <div class="banner-right">
      <button class="btn-white" id="progress-new-note-btn">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
        </svg>
        New Note
      </button>
    </div>
  </div>

  <!-- Two column section -->
  <div class="two-column-layout">
    
    <!-- Left: Course Certificate card -->
    <div class="dashboard-card">
      <div class="card-header-with-icon">
        <div class="card-header-icon">
          <!-- Document icon -->
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
        </div>
        <div class="card-header-info">
          <h2>Course Certificate</h2>
          <p>Complete all modules to unlock</p>
        </div>
      </div>

      <div class="progress-status-container">
        <div class="progress-header-row">
          <span class="title">Requirements Progress</span>
          <span class="percentage" id="requirements-progress-percentage">58%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="requirements-progress-bar" style="width: 58%"></div>
        </div>
        
        <div class="checklist-container">
          <div class="checklist-item checked" id="checklist-modules">
            <div class="check-icon-slot">
              <svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            </div>
            <span>Complete all 48 modules</span>
          </div>
          <div class="checklist-item unchecked" id="checklist-assessments">
            <div class="check-icon-slot">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10"></circle></svg>
            </div>
            <span>Pass all assessments (2/3 completed)</span>
          </div>
        </div>
      </div>

      <button class="btn-gray-locked" id="certificate-lock-btn">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
        Certificate Locked
      </button>
    </div>

    <!-- Right: Learning Insights card -->
    <div class="dashboard-card">
      <div class="card-header-with-icon">
        <div class="card-header-icon">
          <!-- Info icon -->
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <div class="card-header-info">
          <h2>Learning Insights</h2>
        </div>
      </div>

      <div class="insights-list" id="learning-insights-list">
        <!-- Loaded Dynamically -->
      </div>
    </div>

  </div>

  <!-- Assessment Results Section -->
  <div class="assessment-card">
    <h2>Assessment Results</h2>
    <div class="assessment-list" id="assessment-results-list">
      <!-- Loaded Dynamically -->
    </div>
  </div>
</div>
